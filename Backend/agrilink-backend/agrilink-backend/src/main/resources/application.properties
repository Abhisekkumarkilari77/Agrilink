# ============================================
# AgriLink Backend — Application Properties
# ============================================

# Server
server.port=8080
server.servlet.context-path=/api

# MongoDB
spring.data.mongodb.uri=mongodb://localhost:27017/agrilink
spring.data.mongodb.auto-index-creation=true

# JWT Configuration
app.jwt.secret=AgriLinkSecretKeyForJWTTokenGeneration2026ThisShouldBeAtLeast256BitsLongForHS256
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# CORS
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.file.upload-dir=./uploads

# OTP
app.otp.expiry-minutes=5
app.otp.length=6

# Platform Defaults
app.platform.delivery-charge=40
app.platform.commission-percent=15
app.platform.gst-percent=5
app.platform.max-delivery-radius-km=15

# Swagger / OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# Actuator
management.endpoints.web.exposure.include=health,info
management.health.mail.enabled=false

# Mail (console-only for dev — configure real SMTP for production)
spring.mail.host=smtp.gmail.com
spring.mail.port=587

spring.mail.username=kabhisekkumar65@gmail.com
spring.mail.password=naigzwtdcqaublrj

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

spring.mail.default-encoding=UTF-8

# Logging
logging.level.com.agrilink=DEBUG
logging.level.org.springframework.security=INFO
